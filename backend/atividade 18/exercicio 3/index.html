<input type="email" id="email" placeholder="E-mail">
<input type="password" id="senha" placeholder="Senha">
<button id="btnLogin">Entrar e Salvar</button>
<p id="status"></p>

<script>
  document.querySelector('#btnLogin').addEventListener('click', async () => {
    const email = document.querySelector('#email').value;
    const senha = document.querySelector('#senha').value;

    try {
      const resposta = await fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });

      const dados = await resposta.json();

      if (resposta.ok) {
        // Guarda o token permanentemente no navegador do usuário
        localStorage.setItem('meu_token', dados.token);
        document.querySelector('#status').textContent = 'Token guardado com sucesso!';
      } else {
        document.querySelector('#status').textContent = dados.mensagem;
      }
    } catch (erro) {
      document.querySelector('#status').textContent = 'Erro ao conectar.';
    }
  });
</script>
